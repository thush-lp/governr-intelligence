      <h3>RSAC 2026: Five Agent Identity Frameworks Shipped, Three Critical Gaps Left Open</h3>
      <p>RSAC 2026 saw five vendors announce AI agent identity frameworks, with major commitments from CrowdStrike, SentinelOne, Microsoft, Okta, and CyberArk. But VentureBeat&apos;s analysis reveals every single one verified who the agent was and stopped there. None tracked what the agent did. The three gaps named explicitly: no action-level audit trail, no cross-agent delegation chain, and no explainability of what the agent was permitted to do versus what it actually did. Separately, SC Media reports that 82% of executives believe existing policies protect against unauthorised agent actions while 88% of their organisations had confirmed or suspected AI agent security incidents in the last 12 months. For governr, this is the clearest industry confirmation yet that Phase 2 fills the exact gap the market has just named publicly. The regulated-industry differentiation &mdash; FCA, PRA, and EU AI Act compliance evidence &mdash; is the moat that general-purpose identity vendors cannot match.</p>

      <h3>Hugging Face Launches ml-intern: Open-Source AI Agent That Automates the Full ML Engineering Loop</h3>
      <p>Hugging Face released ml-intern on 21 April, and it trended to the top of Hacker News and GitHub on 25 April. The open-source agent reads arXiv papers, creates and fixes datasets, runs training jobs, debugs failures, and iterates autonomously &mdash; outperforming Claude Code on scientific reasoning benchmarks by 22 points on GPQA and beating Codex on a healthcare benchmark by 60%. Hugging Face provisioned $1,000 in GPU resources and Anthropic credits per developer to seed adoption. For governr, ml-intern is a Phase 2 case study in miniature: an autonomous agent with access to external compute, model weights, and scientific literature, operating without a human approval loop. As agentic ML engineering tools proliferate, the question for regulated firms is not whether to use them but how to evidence what they did, why, and with what data.</p>

      <h3>FinCEN&apos;s 25-Year AML Overhaul Sends Unmistakable Signal: AI Compliance Gets Regulatory Safe Harbour</h3>
      <p>FinCEN published its most significant AML/CFT rulemaking in roughly 25 years on 7 April, with analysis circulating widely from 23 April in fintech and compliance media. The proposed rule explicitly states that financial institutions deploying AI in compliance operations are likely to be viewed favourably by regulators, and that firms responsibly experimenting with AI innovation will not incur additional enforcement risk. FinCEN&apos;s director confirmed that AI adoption will be considered when deciding enforcement actions. Comments close 9 June 2026; final rule compliance required 12 months after publication. For governr, this is a US-market entry point with a clear buyer message: FinCEN is rewarding AI-in-compliance, but only if you can evidence that the AI is working and auditable. governr is the audit trail that turns regulatory goodwill into demonstrable compliance.</p>

      <h3>AI Adoption in Financial Services Accelerates Globally: 70%+ of Banks Now Running Agentic AI</h3>

function renderInFrame(frameId, html) {
  const frame = document.getElementById(frameId);
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  // Adjust height after render
  setTimeout(() => {
    try {
      const h = doc.body.scrollHeight;
      frame.style.height = Math.max(h + 40, 600) + 'px';
    } catch(e) {}
  }, 300);
}

async function shareOutput(tab) {
  const htmlMap = {digest: generatedDigest, sales: generatedSales, exec: generatedExec};
  const nameMap = {
    digest: `governr-digest-${new Date().toISOString().slice(0,10)}.html`,
    sales:  `governr-sales-brief-${new Date().toISOString().slice(0,10)}.html`,
    exec:   `governr-exec-briefing-${new Date().toISOString().slice(0,10)}.html`
  };
  const html = htmlMap[tab];
  if (!html) { alert('Run the digest first.'); return; }

  try {
    const file = new File([html], nameMap[tab], {type: 'text/html'});
    if (navigator.canShare && navigator.canShare({files: [file]})) {
      await navigator.share({title: nameMap[tab], files: [file]});
      return;
    }
  } catch(e) {
    if (e.name === 'AbortError') return;
  }

  // HTTPS fallback: Blob download
  try {
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = nameMap[tab];
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  } catch(e) {
    alert('Share failed: ' + e.message);
  }
}

async function callClaude(apiKey, systemPrompt, userPrompt) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 16000,
      tools: [{type: 'web_search_20250305', name: 'web_search'}],
      system: systemPrompt,
      messages: [{role: 'user', content: userPrompt}]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  // Extract all text blocks from response
  const textBlocks = data.content.filter(b => b.type === 'text').map(b => b.text);
  return textBlocks.join('\n');
}

function buildDigestKpiStrip(data) {
  const days = daysUntil(new Date('2026-08-02'));
  const stories = (data.stories || []).length;

  const breaches = (data.breaches || []).length;

  return `<div class="kpi-strip">

  <div class="kpi-item"><span class="kpi-value">${signals}</span><span class="kpi-label">Intelligence Signals</span></div>
</div>`;
}

function buildExecKpiStrip(data) {
  // Compute days to EU AI Act deadline dynamically — never use a hardcoded value
  const daysToAct = daysUntil(new Date('2026-08-02'));
  const breachCount = (data.breaches || []).length;

  // Use API-supplied KPIs but override any days/breach values with computed ones
  let kpis = (data.kpis || []).map(k => {
    // Remove any KPI that duplicates the countdown header (days to EU AI Act)
    if (k.label && k.label.toLowerCase().includes('days to eu')) return null;
    return k;
  }).filter(Boolean);

  // Inject computed breach count KPI if not already present
  const hasBreachKpi = kpis.some(k => k.label && k.label.toLowerCase().includes('cve'));
  if (!hasBreachKpi && breachCount > 0) {
    kpis.splice(1, 0, {
      value: breachCount + ' CVE' + (breachCount !== 1 ? 's' : ''),
      label: 'AI Tooling CVEs Today',
      context: 'Affecting agent infrastructure',
      warn: breachCount > 0
    });
  }

  // Cap at 4 KPIs so the strip doesn't overflow
  kpis = kpis.slice(0, 4);

  const items = kpis.map(k => `    <div class="kpi-item">
      <div class="kpi-value${k.warn ? ' warn' : k.ok ? ' ok' : ''}">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-context">${k.context || ''}</div>
    </div>`).join('\n');
  return `  <div class="kpi-strip">\n${items}\n  </div>`;
}

          <div class="role-icon">${icons[r.role] || ''}</div>
          <div>
            <div class="role-title">${r.role}</div>
            <div class="role-subtitle">${subtitles[r.role] || ''}</div>
          </div>
        </div>
        <div class="role-body">
${actions}
        </div>
      </div>`;
  }).join('\n\n');
}

function buildCoreArgPanels(args) {
  return `  <div class="core-arg">
${(args || []).slice(0,2).map(a => `    <div class="core-arg-panel">
      <div class="core-arg-title">${a.title}</div>
      <div class="core-arg-body">
        <p>${a.body}</p>

          <div class="analogy-text">${a.analogy}</div>
        </div>
      </div>
    </div>`).join('\n')}
  </div>`;
}

function buildEvidenceCards(cards) {
  return (cards || []).slice(0,4).map(c => `      <div class="reason-card${c.primary ? ' primary' : ''}">
        <div class="reason-number">${c.stat}</div>
        <div class="reason-tag">${c.tag}</div>
        <div class="reason-title">${c.title}</div>
        <div class="reason-body">${c.body}</div>
      </div>`).join('\n');
}

function buildEvidenceSection(data) {
  const paras = (data.evidenceParas || []).map(p => `    <p>${p}</p>`).join('\n');
  return `  <div class="evidence-section">
    <div class="section-label">Evidence from Today's Intelligence</div>
    <div class="section-title">${data.evidenceTitle || ''}</div>
${paras}
  </div>`;
}

// ─────────────────────────────────────────────
// DATE HELPERS
// ─────────────────────────────────────────────
function formatDate(d) {
  return d.toLocaleDateString('en-GB', {day: 'numeric', month: 'long', year: 'numeric'});
}

function daysUntil(target) {
  const now = new Date();
  now.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.max(0, Math.round((target - now) / 86400000));
}

// ─────────────────────────────────────────────
// MAIN RUN FUNCTION
// ─────────────────────────────────────────────
async function runDigest() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('Please enter your Anthropic API key above.'); return; }

  clearError();
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('progress').classList.add('visible');
  document.getElementById('outputs').classList.remove('visible');
  document.getElementById('progressLog').innerHTML = '';

  const today = formatDate(new Date());

  try {
    // ── STEP 1: Search and gather news ──
    log(`Searching primary sources for news published in last 24 hours...`);
    setProgress(10);

    const newsSystem = `You are an intelligence analyst for governr, an AI risk and governance company serving regulated financial institutions.

Your job is to search broadly across the web for today's AI risk and governance news — stories published in the last 24 hours only. Do not limit yourself to any specific list of sites. Search widely using multiple queries to find at least 6 strong stories. Good sources include but are not limited to: The Hacker News, VentureBeat, MIT Technology Review, FinTech Global, SC Media, Cisco Talos, JDSupra, Cybersecurity Dive, eSecurity Planet, Plural Policy, FinCEN, Reuters, FT, Bloomberg, Wired, Ars Technica, Dark Reading, SecurityWeek, BankingDive, American Banker, Finextra, and any other credible publication covering relevant topics.

Use multiple search queries across these topic areas to find stories:

- Agentic AI developments relevant to financial services
- Financial services AI adoption, compliance, enforcement actions, vendor news
- Open source AI agent repos trending on GitHub

You MUST return exactly 6 stories. No more, no fewer. Search until you have found at least 6 strong, relevant stories from the last 24 hours, then select the best 6. If your first searches don't find 6, search again with different queries. Do not return fewer than 6 stories under any circumstances. Do not return more than 6 stories under any circumstances.

Return ONLY valid JSON. No markdown. No preamble. No backticks.

Return this exact structure:
{
  "stories": [
    {
      "recency": "TODAY",
      "published": "YYYY-MM-DD — the exact date this story was published. THIS FIELD IS MANDATORY. If you cannot confirm the publication date, do not include the story",
      "signal": "Agent Controls Urgency",
      "headline": "string",
      "body": "3-4 sentence summary with governr commercial framing",
      "sources": "HTML: <a href='URL' target='_blank'>Source Name</a>, Date",
      "signal_exec": "Governance Gap",
      "body_exec": "2 sentence version for executive audience",
      "sources_exec": "HTML: <a href='URL' target='_blank'>Source Name</a> &middot; Date"
    }
  ],
  "repos": [
    {
      "name": "org/repo",
      "url": "https://github.com/...",
      "desc": "string",
      "stars": "~12k stars",
      "lang": "Python",
      "licence": "MIT",
      "why": "string",
      "badge": "watch",
      "badgeLabel": "Watch",
      "atlas": "string",
      "agentControls": "string",
      "decisionIntel": "string"
    }
  ],
  "breaches": [
    {

      "url": "https://...",
      "cvss": "10.0",
      "system": "n8n AI Workflow",
      "vector": "string",
      "relevance": "string"
    }
  ],
  "kpis": [
    {"value": "2", "label": "CVSS 10.0 CVEs This Week", "context": "AI tooling: patch now", "warn": true},
    {"value": "70%+", "label": "Banks Running Agentic AI", "context": "Most without governance layer"},
    {"value": "TBC", "label": "AI Tooling CVEs This Week", "context": "Patch priority", "warn": true},
    {"value": "5", "label": "RSAC Frameworks Shipped", "context": "None include action audit", "ok": true}
  ],
  "validates": [
    {"title": "string", "body": "string"}
  ],
  "atlas": [{"title": "string", "body": "string"}],
  "agentControls": [{"title": "string", "body": "string"}],
  "decisionIntel": [{"title": "string", "body": "string"}],
  "honest": [{"title": "string", "body": "string"}],
  "verdict": {"title": "string", "body": "string"},
  "gtm": [
    {"tier": "NOW", "title": "string", "body": "string"}
  ],
  "roles": [
    {
      "role": "CRO",
      "actions": [
        {"text": "string", "urgency": "Now"},
        {"text": "string", "urgency": "Soon"},
        {"text": "string", "urgency": "Watch"}
      ]
    },
    {"role": "CISO", "actions": [{"text":"string","urgency":"Now"},{"text":"string","urgency":"Now"},{"text":"string","urgency":"Soon"}]},
    {"role": "CTO", "actions": [{"text":"string","urgency":"Now"},{"text":"string","urgency":"Soon"},{"text":"string","urgency":"Watch"}]},
    {"role": "COO", "actions": [{"text":"string","urgency":"Now"},{"text":"string","urgency":"Soon"},{"text":"string","urgency":"Soon"}]}
  ],
  "headline": "Sales brief hero headline — the main threat or regulatory hook in 15 words max",
  "heroSub": "2 sentence sub-headline with context for sceptical CISO audience",
  "objection": "The most common prospect objection to this story, as they would say it",
  "briefTitle": "Sales brief title for footer",
  "coreArgs": [
    {
      "title": "Panel 1 title rebutting the objection",
      "body": "Panel 1 argument",
      "analogy": "Regulatory analogy (PRA/FCA/DORA/EU AI Act)"
    },
    {
      "title": "Panel 2 title rebutting the objection from different angle",
      "body": "Panel 2 argument",
      "analogy": "Regulatory analogy"
    }
  ],
  "evidenceCards": [
    {"stat": "10.0", "tag": "CVSS Score", "title": "string", "body": "string", "primary": true},
    {"stat": "686%", "tag": "Attack Volume", "title": "string", "body": "string"},
    {"stat": "89%", "tag": "Attack Surge", "title": "string", "body": "string"},
    {"stat": "12k+", "tag": "Exposed Instances", "title": "string", "body": "string"}
  ],
  "evidenceTitle": "string",
  "evidenceParas": ["paragraph 1 with hyperlinks", "paragraph 2 with hyperlinks", "paragraph 3 with sales conversation opener"]
}

Signal options for stories[].signal: Atlas Validates, Agent Controls Urgency, Decision Intelligence Signal, Sales Signal, Timing Risk, Watch, Competitive
Signal options for stories[].signal_exec: Governance Gap, Regulatory Opportunity, Compliance Risk, Active Threat, Emerging Risk, Industry Insight

Rules:
- 24 hours only. Do not include older stories.
- EXACTLY 6 stories. No more, no fewer. Select the best 6 from everything you find.
- EXACTLY 4 open source repos. Search GitHub trending to find 4. No more, no fewer.
- JSON must be valid. Escape all special characters in string values. Use double quotes for JSON strings. Do not use smart quotes, curly quotes, or unescaped apostrophes inside string values. Replace any apostrophe inside a string value with \' or reword to avoid it. Do not include raw newlines inside string values.
- Every source must have a real URL you found via search.
- governr is always lower case.
- UK English.
- No em dashes.
- Pick the single most commercially compelling story for the sales brief sections.`;

    const newsUser = `Today is ${today}. Search broadly across the web for AI risk and governance stories published in the last 24 hours. Use multiple search queries. You must return exactly 6 stories — the best 6 you find. Search until you have at least 6 candidates, then select the strongest 6. Return the complete JSON structure with exactly 6 stories.`;

    log(`Searching sources and building intelligence...`);
    setProgress(20);

    const rawResponse = await callClaude(apiKey, newsSystem, newsUser);

    log(`Processing search results...`, 'done');
    setProgress(60);

    // Parse JSON — strip any markdown fences
    let jsonStr = rawResponse.trim();
    jsonStr = jsonStr.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
    // Find the JSON object
    const jsonStart = jsonStr.indexOf('{');
    const jsonEnd = jsonStr.lastIndexOf('}');
    if (jsonStart === -1 || jsonEnd === -1) throw new Error('Could not find JSON in response. Raw: ' + jsonStr.slice(0, 200));
    jsonStr = jsonStr.slice(jsonStart, jsonEnd + 1);

    let data;
    // Attempt 1: parse as-is
    try {
      data = JSON.parse(jsonStr);
    } catch(e1) {
      // Attempt 2: sanitise control chars, smart quotes, then retry
      try {
        let cleaned = jsonStr
          .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
          .replace(/[\u2018\u2019]/g, "\'")
          .replace(/[\u201C\u201D]/g, '\\"')
          .replace(/\u2014/g, '-')
          .replace(/\u00A0/g, ' ');
        data = JSON.parse(cleaned);
      } catch(e2) {
        // Attempt 3: Function constructor handles trailing commas etc
        try {
          data = Function('"use strict"; return (' + jsonStr + ')')();
        } catch(e3) {
          throw new Error('JSON parse failed after 3 attempts: ' + e1.message + '\nRaw snippet: ' + jsonStr.slice(0, 400));
        }
      }
    }

    // ── DEBUG: log raw API response before filtering ──
    log(`API returned ${(data.stories||[]).length} stories raw`, 'active');
    (data.stories||[]).forEach((s,i) => {
      log(`Story ${i+1}: published="${s.published}" headline="${(s.headline||'').slice(0,50)}" hasHref=${(s.sources||'').includes('href=')}`, 'active');
    });

    // ── CODE-ENFORCED RULES ──────────────────────────────
    // Rules enforced here in code cannot be ignored by the model.

    // Cutoff: midnight yesterday
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 1);
    cutoff.setHours(0, 0, 0, 0);

    // 1. DATE FILTER — published field only, no exceptions
    const allStories = (data.stories || []);
    data.stories = allStories.filter(s => {
      if (!s.published) return false;
      const pub = new Date(s.published);
      if (isNaN(pub)) return false;
      if (pub < cutoff) {
        log(`Stripped (${s.published}): "${(s.headline||'').slice(0,60)}"`, 'error');
        return false;
      }
      return true;
    });
    const stripped = allStories.length - data.stories.length;
    if (stripped > 0) log(`Stripped ${stripped} story/stories — old or no date`, 'error');

    // 2. STORY COUNT — hard cap at 6
    if (data.stories.length > 6) data.stories = data.stories.slice(0, 6);
    if (data.stories.length < 6) log(`Only ${data.stories.length} valid stories — consider re-running`, 'error');

    // 3. REPO COUNT — hard cap at 4
    const allRepos = (data.repos || []);
    if (allRepos.length > 4) data.repos = allRepos.slice(0, 4);
    if (allRepos.length < 4) log(`Only ${allRepos.length} repos — expected 4`, 'error');

    // 4. SOURCE URL — strip stories with no href in sources field
    data.stories = data.stories.filter(s => {
      const hasUrl = (s.sources || '').includes('href=');
      if (!hasUrl) log(`Stripped — no source URL: "${(s.headline||'').slice(0,60)}"`, 'error');
      return hasUrl;
    });

    // 5. DUPLICATE DETECTION — strip stories with duplicate headline or URL
    const seenHeadlines = new Set();
    const seenUrls = new Set();
    data.stories = data.stories.filter(s => {
      const h = (s.headline || '').toLowerCase().trim();
      const urlMatch = (s.sources || '').match(/href=['"]([^'"]+)['"]/);
      const url = urlMatch ? urlMatch[1] : null;
      if (seenHeadlines.has(h)) { log(`Stripped duplicate headline: "${h.slice(0,60)}"`, 'error'); return false; }
      if (url && seenUrls.has(url)) { log(`Stripped duplicate URL: ${url}`, 'error'); return false; }
      seenHeadlines.add(h);
      if (url) seenUrls.add(url);
      return true;
    });

    // 6. SIGNAL VALIDATION — enforce allowed values, default to Watch
    const VALID_SIGNALS = new Set(['Atlas Validates','Agent Controls Urgency','Decision Intelligence Signal','Sales Signal','Timing Risk','Watch','Competitive']);
    const VALID_EXEC_SIGNALS = new Set(['Governance Gap','Regulatory Opportunity','Compliance Risk','Active Threat','Emerging Risk','Industry Insight']);
    data.stories = data.stories.map(s => ({
      ...s,
      signal: VALID_SIGNALS.has(s.signal) ? s.signal : 'Watch',
      signal_exec: VALID_EXEC_SIGNALS.has(s.signal_exec) ? s.signal_exec : 'Emerging Risk',
    }));

    // 7. EVIDENCE CARDS — enforce exactly 4
    const allCards = (data.evidenceCards || []);
    if (allCards.length > 4) data.evidenceCards = allCards.slice(0, 4);
    if (allCards.length < 4) {
      // Pad with empty cards so the template always gets 4
      while (data.evidenceCards.length < 4) {
        data.evidenceCards.push({stat: '—', tag: 'Data', title: 'Insufficient data', body: '', primary: false});
      }
    }

    // 8. ROLES — enforce exactly CRO, CISO, CTO, COO in that order with exactly 3 actions each
    const REQUIRED_ROLES = ['CRO', 'CISO', 'CTO', 'COO'];
    const VALID_URGENCY = new Set(['Now', 'Soon', 'Watch']);
    const roleMap = {};
    (data.roles || []).forEach(r => { roleMap[r.role] = r; });
    data.roles = REQUIRED_ROLES.map(role => {
      const existing = roleMap[role] || {role, actions: []};
      let actions = (existing.actions || []).map(a => ({
        ...a,
        urgency: VALID_URGENCY.has(a.urgency) ? a.urgency : 'Watch'
      }));
      // Trim to 3
      if (actions.length > 3) actions = actions.slice(0, 3);
      // Pad to 3 if needed
      while (actions.length < 3) actions.push({text: 'Monitor developments in this area.', urgency: 'Watch'});
      return {...existing, actions};
    });

    // 9. governr CAPITALISATION — fix in all text fields
    const fixG = str => (str || '').replace(/Governr/g, 'governr').replace(/GOVERNR/g, 'governr');
    data.stories = data.stories.map(s => ({
      ...s,
      headline: fixG(s.headline),
      body: fixG(s.body),
      body_exec: fixG(s.body_exec),
    }));

    log(`${data.stories.length} stories · ${(data.breaches||[]).length} breach alerts · ${(data.repos||[]).length} repos`, 'done');
    setProgress(70);

    // ── STEP 2: Inject into templates ──
    log(`Injecting content into digest template...`);
    generatedDigest = injectDigest(data);
    setProgress(80);

    log(`Injecting content into sales brief template...`);
    generatedSales = injectSales(data);
    setProgress(87);

    log(`Injecting content into exec briefing template...`);
    generatedExec = injectExec(data);
    setProgress(95);

    // ── STEP 3: Render ──
    log(`Rendering outputs...`);
    renderInFrame('frame-digest', generatedDigest);
    renderInFrame('frame-sales', generatedSales);
    renderInFrame('frame-exec', generatedExec);

    setProgress(100);
    log(`All three outputs ready.`, 'done');

    document.getElementById('outputs').classList.add('visible');

  } catch(err) {
    log(`Error: ${err.message}`, 'error');
    showError(`Something went wrong: ${err.message}`);
  } finally {
    btn.disabled = false;
  }
}
